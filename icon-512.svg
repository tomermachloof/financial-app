<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="graphLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <rect width="512" height="512" rx="100" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>
  <!-- Shekel symbol -->
  <text x="256" y="280" text-anchor="middle" font-family="Arial, sans-serif" font-size="192" font-weight="bold" fill="white" opacity="0.95">&#8362;</text>
  <!-- Rising graph line -->
  <polyline points="85,386 165,368 235,341 293,314 360,261 427,192" fill="none" stroke="url(#graphLine)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Graph dot at peak -->
  <circle cx="427" cy="192" r="16" fill="#10B981"/>
  <circle cx="427" cy="192" r="8" fill="white"/>
  <!-- Small arrow tip -->
  <polygon points="427,165 448,197 413,192" fill="#10B981"/>
</svg>
