<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E40AF"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="graphLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#10B981"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>
  <!-- Subtle inner shadow -->
  <rect width="192" height="192" rx="38" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Shekel symbol -->
  <text x="96" y="105" text-anchor="middle" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" opacity="0.95">&#8362;</text>
  <!-- Rising graph line -->
  <polyline points="32,145 62,138 88,128 110,118 135,98 160,72" fill="none" stroke="url(#graphLine)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Graph dot at peak -->
  <circle cx="160" cy="72" r="6" fill="#10B981"/>
  <circle cx="160" cy="72" r="3" fill="white"/>
  <!-- Small arrow tip -->
  <polygon points="160,62 168,74 155,72" fill="#10B981"/>
</svg>
