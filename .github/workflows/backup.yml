name: Nightly Production Backup

on:
  schedule:
    - cron: '0 22 * * *'  # 00:00 Israel time (UTC+2)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout backups branch (or create it)
        uses: actions/checkout@v4
        with:
          ref: backups
          fetch-depth: 0
        continue-on-error: true

      - name: Init backups branch if it doesn't exist
        run: |
          git fetch origin backups 2>/dev/null || {
            git checkout --orphan backups
            git rm -rf . 2>/dev/null || true
            mkdir -p backups
            echo "# Production Backups" > README.md
            git add README.md
            git config user.name "backup-bot"
            git config user.email "backup@financial-app"
            git commit -m "Init backups branch"
            git push origin backups
          }
          mkdir -p backups

      - name: Download state from production Supabase
        env:
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.PROD_SUPABASE_KEY }}
        run: |
          DATE=$(date +%Y-%m-%d)
          curl -sf "${SUPABASE_URL}/rest/v1/app_state?id=eq.main&select=state_v2,updated_at" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}" \
            -o "backups/backup-${DATE}.json"
          echo "Backup saved: backups/backup-${DATE}.json"
          cat "backups/backup-${DATE}.json" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Loans:', len(d[0]['state_v2'].get('loans',[])), '| Accounts:', len(d[0]['state_v2'].get('accounts',[])))" 2>/dev/null || true

      - name: Commit backup to backups branch
        run: |
          git config user.name "backup-bot"
          git config user.email "backup@financial-app"
          git add backups/
          git diff --staged --quiet || git commit -m "Backup $(date +%Y-%m-%d)"
          git push origin HEAD:backups
