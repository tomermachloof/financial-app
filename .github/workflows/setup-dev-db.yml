name: Setup Dev Database (one-time)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Create app_state table in dev Supabase
        run: |
          npm install pg
          node -e "
          const { Client } = require('pg');
          const regions = ['eu-west-1','eu-central-1','us-east-1','ap-southeast-1','ap-south-1'];
          const ref = 'okwanpvphtoqhmufxcyv';
          const pw = 'Ttomermm10%25';

          async function tryAndSetup(region) {
            const client = new Client({
              host: 'aws-0-' + region + '.pooler.supabase.com',
              port: 5432, database: 'postgres',
              user: 'postgres.' + ref, password: decodeURIComponent(pw),
              ssl: { rejectUnauthorized: false }, connectionTimeoutMillis: 6000
            });
            try {
              await client.connect();
              console.log('Connected via', region);
              await client.query(\`create table if not exists app_state (id text primary key, state jsonb default '{}', state_v2 jsonb default '{}', updated_at timestamptz default now())\`);
              await client.query(\`insert into app_state (id, state_v2) values ('main','{}') on conflict (id) do nothing\`);
              await client.query(\`alter table app_state enable row level security\`);
              try { await client.query(\`create policy allow_all on app_state for all using (true) with check (true)\`); } catch(e) {}
              await client.end();
              console.log('SUCCESS - table created and row inserted');
              process.exit(0);
            } catch(e) {
              console.log(region, 'failed:', e.message);
              return false;
            }
          }

          (async () => {
            for (const r of regions) {
              const ok = await tryAndSetup(r);
              if (ok !== false) break;
            }
          })();
          "
